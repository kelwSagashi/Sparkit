name: Python package

# Run on tag pushes (publish), on pushes to main (build for validation),
# and allow manual runs from the Actions UI.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        # Only publish when this run was triggered by a tag push (refs/tags/v...)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_NON_INTERACTIVE: '1'
        run: |
          python -m pip install --upgrade twine
          # Use verbose + non-interactive to show full server response on failures
          python -m twine upload --verbose --non-interactive dist/*
